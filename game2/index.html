<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Фьюмик прыгает по облакам — Логическая игра</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#b3e5fc, #e1f5fe);
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
    text-align: center;
  }

  #sky {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .cloud {
    position: absolute;
    width: 160px;
    height: 60px;
    background: white;
    border-radius: 50px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  #c1 { left: 10%; top: 65%; }
  #c2 { left: 30%; top: 55%; }
  #c3 { left: 50%; top: 65%; }
  #c4 { left: 70%; top: 55%; }
  #c5 { left: 85%; top: 65%; }

  #finish {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translateX(-50%);
    width: 260px;
    height: 100px;
    background: white;
    border-radius: 60px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    display: none;
  }

  #cat {
    position: absolute;
    width: 90px;
    transition: 0.6s ease;
  }

  .fumik {
    width: 90px;
  }

  #task-box {
    position: absolute;
    bottom: 20px;
    width: 100%;
  }

  #question {
    font-size: 32px;
    margin-bottom: 10px;
    font-weight: bold;
    color: #0d47a1;
  }

  .answer-btn {
    font-size: 26px;
    padding: 12px 20px;
    margin: 6px;
    border-radius: 12px;
    border: none;
    background: #90caf9;
    cursor: pointer;
  }

  .answer-btn:hover {
    background: #64b5f6;
  }

  #result {
    font-size: 40px;
    margin-top: 10px;
  }

  #reward {
    font-size: 40px;
    margin-top: 10px;
    color: #ff9800;
  }

  #restart {
    display: none;
    margin-top: 20px;
    font-size: 26px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: #4caf50;
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="sky">

  <div class="cloud" id="c1"></div>
  <div class="cloud" id="c2"></div>
  <div class="cloud" id="c3"></div>
  <div class="cloud" id="c4"></div>
  <div class="cloud" id="c5"></div>

  <div id="finish"></div>

  <img id="cat" class="fumik" src="data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'>
    <circle cx='100' cy='100' r='70' fill='%23b388ff'/>
    <circle cx='75' cy='80' r='15' fill='white'/>
    <circle cx='125' cy='80' r='15' fill='white'/>
    <circle cx='75' cy='80' r='7' fill='black'/>
    <circle cx='125' cy='80' r='7' fill='black'/>
    <path d='M70 120 Q100 140 130 120' stroke='black' stroke-width='5' fill='none'/>
    <path d='M60 60 L80 40 L90 70' fill='%23b388ff'/>
    <path d='M140 60 L120 40 L110 70' fill='%23b388ff'/>
  </svg>"/>

  <div id="task-box">
    <div id="question"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <div id="reward"></div>
    <button id="restart">Играть ещё</button>
  </div>

</div>

<script>
const clouds = [
  {x: "10%", y: "65%"},
  {x: "30%", y: "55%"},
  {x: "50%", y: "65%"},
  {x: "70%", y: "55%"},
  {x: "85%", y: "65%"}
];

function generateTask() {
  const max = Math.random() < 0.5 ? 10 : 100;
  const type = Math.floor(Math.random() * 4);

  let a = Math.floor(Math.random() * max) + 1;
  let b = Math.floor(Math.random() * max) + 1;

  switch (type) {
    case 0:
      return `${a} + ? = ${a + b}`;
    case 1:
      return `? + ${a} = ${a + b}`;
    case 2:
      if (a < b) [a, b] = [b, a];
      return `${a} - ? = ${a - b}`;
    case 3:
      if (b < a) [a, b] = [b, a];
      return `? - ${a} = ${b - a}`;
  }
}

const tasks = [
  generateTask(),
  generateTask(),
  generateTask(),
  generateTask(),
  generateTask()
];

function solve(task) {
  let t = task.replace(/\s/g, "");
  let [left, right] = t.split("=");
  right = Number(right);

  if (left.includes("+?")) return right - Number(left.split("+")[0]);
  if (left.includes("?+")) return right - Number(left.split("+")[1]);
  if (left.includes("-?")) return Number(left.split("-")[0]) - right;
  if (left.includes("?-")) return right + Number(left.split("-")[1]);
}

const cat = document.getElementById("cat");
const questionBox = document.getElementById("question");
const answersBox = document.getElementById("answers");
const resultBox = document.getElementById("result");
const rewardBox = document.getElementById("reward");
const finish = document.getElementById("finish");
const restartBtn = document.getElementById("restart");

let index = 0;

function placeCat(i) {
  cat.style.left = clouds[i].x;
  cat.style.top = clouds[i].y;
}

placeCat(0);

function showTask() {
  let task = tasks[index];
  let correct = solve(task);

  questionBox.innerText = task;

  let options = [correct];
  while (options.length < 3) {
    let fake = correct + Math.floor(Math.random() * 10 - 5);
    if (fake !== correct && fake > 0) options.push(fake);
  }
  options.sort(() => Math.random() - 0.5);

  answersBox.innerHTML = "";
  options.forEach(num => {
    let btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.innerText = num;
    btn.onclick = () => check(num, correct);
    answersBox.appendChild(btn);
  });
}

function check(answer, correct) {
  if (answer === correct) {
    resultBox.innerText = "👍";
    index++;

    if (index < clouds.length) {
      placeCat(index);
      showTask();
    }

    if (index === clouds.length) {
      finish.style.display = "block";
      rewardBox.innerText = "🧁 Пышкин дарит кексик!";
      answersBox.innerHTML = "";
      questionBox.innerText = "Рейс выполнён!";
      restartBtn.style.display = "inline-block";
    }

  } else {
    resultBox.innerText = "🙈";
    cat.style.transform = "translateY(20px)";
    setTimeout(() => cat.style.transform = "translateY(0)", 300);
  }
}

restartBtn.onclick = () => {
  index = 0;

  for (let i = 0; i < tasks.length; i++) {
    tasks[i] = generateTask();
  }

  placeCat(0);

  finish.style.display = "none";
  rewardBox.innerText = "";
  resultBox.innerText = "";
  restartBtn.style.display = "none";

  showTask();
};

showTask();
</script>

</body>
</html>
