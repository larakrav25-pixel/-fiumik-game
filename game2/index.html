<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Рейс Фьюмика — Логическая игра</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(#e3f2fd, #bbdefb);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    #game-box {
      background: #ffffff;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    #question {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: bold;
      color: #0d47a1;
    }

    .answer-btn {
      font-size: 26px;
      padding: 14px 24px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      background: #90caf9;
      cursor: pointer;
      width: 80%;
    }

    .answer-btn:hover {
      background: #64b5f6;
    }

    #result {
      font-size: 40px;
      margin-top: 20px;
    }

    #reward {
      font-size: 40px;
      margin-top: 10px;
      color: #ff9800;
    }
  </style>
</head>

<body>
  <div id="game-box">
    <div id="question"></div>
    <div id="answers"></div>
    <div id="result"></div>
    <div id="reward"></div>
  </div>

<script>
// 30 задач без ответов
const tasks = [
  "3 + ? = 5", "? + 1 = 4", "6 - ? = 4", "? - 2 = 3", "8 - ? = 5", "? + 2 = 7",
  "10 + ? = 13", "? + 5 = 14", "17 - ? = 10", "? - 4 = 9", "12 + ? = 18", "? - 7 = 5",
  "21 - ? = 15", "? + 7 = 24", "28 - ? = 21", "? - 9 = 11", "14 + ? = 29", "? - 6 = 18",
  "34 - ? = 20", "? + 12 = 45", "47 - ? = 29", "? - 15 = 22", "26 + ? = 50", "? - 8 = 31",
  "54 - ? = 29", "? + 18 = 73", "92 - ? = 47", "? - 27 = 40", "63 + ? = 99", "? - 34 = 12"
];

// Функция вычисления правильного ответа
function solve(task) {
  let t = task.replace(/\s/g, "");
  let [left, right] = t.split("=");
  right = Number(right);

  if (left.includes("+?")) {
    let a = Number(left.split("+")[0]);
    return right - a;
  }
  if (left.includes("?+")) {
    let b = Number(left.split("+")[1]);
    return right - b;
  }
  if (left.includes("-?")) {
    let a = Number(left.split("-")[0]);
    return a - right;
  }
  if (left.includes("?-")) {
    let b = Number(left.split("-")[1]);
    return right + b;
  }
}

// HTML элементы
const questionBox = document.getElementById("question");
const buttons = document.getElementById("answers");
const resultBox = document.getElementById("result");
const rewardBox = document.getElementById("reward");

let index = 0;
let correctStreak = 0;

// Показ задачи
function showTask() {
  let task = tasks[index];
  let correct = solve(task);

  questionBox.innerText = task;

  // Генерируем 3 варианта
  let options = [correct];
  while (options.length < 3) {
    let fake = correct + Math.floor(Math.random() * 10 - 5);
    if (fake !== correct && fake > 0) options.push(fake);
  }
  options.sort(() => Math.random() - 0.5);

  buttons.innerHTML = "";
  options.forEach(num => {
    let btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.innerText = num;
    btn.onclick = () => check(num, correct);
    buttons.appendChild(btn);
  });
}

// Проверка ответа
function check(answer, correct) {
  if (answer === correct) {
    resultBox.innerText = "👍";
    correctStreak++;

    if (correctStreak === 5) {
      rewardBox.innerText = "🧁 Пышкин дарит кексик!";
      correctStreak = 0;
    }
  } else {
    resultBox.innerText = "🙈";
    correctStreak = 0;
  }

  index++;
  if (index < tasks.length) {
    setTimeout(() => {
      resultBox.innerText = "";
      rewardBox.innerText = "";
      showTask();
    }, 900);
  } else {
    questionBox.innerText = "Рейс завершён!";
    buttons.innerHTML = "";
  }
}

showTask();
</script>

</body>
</html>
